<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LipiSetu - Street Sign Transliteration</title>
    <meta name="description" content="Transliterate Indian street signs instantly into your preferred script.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Hind:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6200ea">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3898/3898082.png">

    <!-- Libraries -->
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Sanscript for Transliteration -->
    <script src="https://cdn.jsdelivr.net/npm/@indic-transliteration/sanscript@1.2.0/sanscript.min.js"></script>
    <!-- Leaflet.js for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <div class="app-container">
        <!-- PWA Install Button (Hidden by default) -->
        <button id="installBtn" class="btn-install hidden">
            <span class="material-symbols-rounded">download</span>
            Install App
        </button>
        <header class="app-header">
            <div class="logo">
                <span class="material-symbols-rounded">translate</span>
                <h1>LipiSetu</h1>
            </div>
            <p class="tagline">Bridging Scripts, Connecting Bharat</p>
        </header>

        <main class="main-content">
            <!-- Camera/Upload Section -->
            <section class="input-section" id="inputSection">
                <div class="media-container">
                    <video id="cameraFeed" autoplay playsinline class="hidden"></video>
                    <img id="imagePreview" class="hidden" alt="Sign preview">

                    <div class="placeholder-content" id="placeholderContent">
                        <span class="material-symbols-rounded icon-large">add_a_photo</span>
                        <p>Capture or Upload a Sign</p>
                        <div class="action-buttons">
                            <button id="cameraBtn" class="btn btn-primary">
                                <span class="material-symbols-rounded">photo_camera</span>
                                Camera
                            </button>
                            <button id="liveScanBtn" class="btn btn-primary"
                                style="background: var(--accent-color); color: #000;">
                                <span class="material-symbols-rounded">videocam</span>
                                Live Scan
                            </button>
                            <button id="uploadBtn" class="btn btn-secondary">
                                <span class="material-symbols-rounded">upload_file</span>
                                Upload
                            </button>
                        </div>
                    </div>

                    <!-- Hidden File Input (Moved outside to prevent deletion) -->
                    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>

                    <!-- Capture Button (only visible when camera is active) -->
                    <button id="captureBtn" class="btn-capture hidden" aria-label="Capture photo"></button>

                    <!-- Close Camera Button -->
                    <button id="closeCameraBtn" class="btn-icon-float top-right hidden">
                        <span class="material-symbols-rounded">close</span>
                    </button>

                    <!-- New Video Controls (Pause/Stop) -->
                    <div id="videoControls" class="video-controls hidden">
                        <button id="pauseBtn" class="btn-control">
                            <span class="material-symbols-rounded">pause</span>
                            <span>Pause</span>
                        </button>
                        <button id="stopScanBtn" class="btn-control danger">
                            <span class="material-symbols-rounded">stop_circle</span>
                            <span>Stop</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Controls Section -->
            <section class="controls-section">
                <div class="language-selector">
                    <div class="select-group">
                        <label>Detected Script</label>
                        <select id="sourceScript">
                            <option value="auto">Auto-Detect</option>
                            <option value="devanagari">Devanagari (Hindi/Mar)</option>
                            <option value="bengali">Bengali/Assamese</option>
                            <option value="gujarati">Gujarati</option>
                            <option value="gurmukhi">Gurmukhi (Punjabi)</option>
                            <option value="kannada">Kannada</option>
                            <option value="malayalam">Malayalam</option>
                            <option value="oriya">Odia</option>
                            <option value="tamil">Tamil</option>
                            <option value="telugu">Telugu</option>
                        </select>
                    </div>

                    <button id="swapLangBtn" class="btn-icon" aria-label="Swap scripts">
                        <span class="material-symbols-rounded">swap_horiz</span>
                    </button>

                    <div class="select-group">
                        <label>Read In</label>
                        <select id="targetScript">
                            <option value="devanagari">Devanagari</option>
                            <option value="bengali">Bengali</option>
                            <option value="gujarati">Gujarati</option>
                            <option value="gurmukhi">Gurmukhi</option>
                            <option value="kannada">Kannada</option>
                            <option value="malayalam">Malayalam</option>
                            <option value="oriya">Odia</option>
                            <option value="tamil">Tamil</option>
                            <option value="telugu">Telugu</option>
                            <option value="iast">Roman (English)</option>
                        </select>
                    </div>
                </div>

                <div class="process-actions">
                    <button id="processBtn" class="btn btn-accent full-width" disabled>
                        <span class="material-symbols-rounded">auto_awesome</span>
                        Transliterate Sign
                    </button>
                </div>
            </section>

            <!-- Geo-Lipi Map Section -->
            <section class="map-section hidden" id="mapSection">
                <div class="section-header">
                    <h2><span class="material-symbols-rounded">map</span> Geo-Lipi Map</h2>
                    <button id="closeMapBtn" class="btn-icon-small">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div id="mapContainer"></div>
                <p class="map-hint">Locations of your scanned signs</p>
            </section>


            <!-- Results Section -->
            <section class="results-section hidden" id="resultsSection">
                <div class="result-card">
                    <div class="card-header">
                        <span class="label">Original Text</span>
                        <div class="card-actions">
                            <button class="btn-icon-small copy-btn" data-target="originalText">
                                <span class="material-symbols-rounded">content_copy</span>
                            </button>
                            <button class="btn-icon-small speak-btn" data-target="originalText">
                                <span class="material-symbols-rounded">volume_up</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-content" id="originalText">
                        <!-- OCR Result -->
                    </div>
                </div>

                <div class="divider">
                    <span class="material-symbols-rounded">arrow_downward</span>
                </div>

                <div class="result-card highlight">
                    <div class="card-header">
                        <span class="label">Transliteration</span>
                        <div class="card-actions">
                            <button class="btn-icon-small copy-btn" data-target="transliteratedText">
                                <span class="material-symbols-rounded">content_copy</span>
                            </button>
                            <button class="btn-icon-small speak-btn" data-target="transliteratedText">
                                <span class="material-symbols-rounded">volume_up</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-content large-text" id="transliteratedText">
                        <!-- Transliteration Result -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Dictionary Card (Smart Sense) -->
        <div id="dictionaryCard" class="ai-card hidden">
            <div class="ai-header">
                <span><span class="material-symbols-rounded">book_2</span> Word Meaning</span>
                <button id="closeDictCard" style="background:none; border:none; color:white;">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <div class="ai-content">
                <h3 id="dictWord" style="color:var(--accent-color); margin-bottom:5px;">Word</h3>
                <p id="dictMeaning" style="font-size: 1.1rem;">Meaning...</p>
                <span id="dictType"
                    style="font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">Type</span>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay hidden" id="loadingOverlay">
            <div class="loader"></div>
            <p id="loadingText">Processing Image...</p>
        </div>
    </div>

    <script src="transliterator.js"></script>
    <script src="dictionary.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
